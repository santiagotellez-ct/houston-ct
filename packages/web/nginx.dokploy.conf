server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA routing: any path serves index.html so React Router works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
