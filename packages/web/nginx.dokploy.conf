server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # HACK: Intercept /api/auth/status — the host doesn't serve this at root.
  # Return a fake AuthStatus saying Anthropic is already connected, so the
  # web app skips the OAuth gate and mounts the desktop UI.
  location = /api/auth/status {
    default_type application/json;
    add_header Cache-Control "no-store";
    return 200 '{"providers":[{"provider":"anthropic","name":"Claude","configured":true,"login":null}],"activeProvider":"anthropic"}';
  }

  # Proxy every other /api/* request to the real Houston host.
  # The trailing slash + rewrite strips /api and forwards the rest.
  location /api/ {
    proxy_pass https://agents-houston-7oo24v-3e01e9-2-24-113-98.sslip.io/;
    proxy_ssl_server_name on;
    proxy_http_version 1.1;
    proxy_set_header Host agents-houston-7oo24v-3e01e9-2-24-113-98.sslip.io;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Connection "";
    # SSE-safe streaming (chat + /v1/events firehose).
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
