services:
  web:
    build:
      context: ../..
      dockerfile: packages/web/Dockerfile.dokploy
      args:
        VITE_NEW_ENGINE: "1"
        VITE_NEW_ENGINE_URL: "${VITE_NEW_ENGINE_URL:?set VITE_NEW_ENGINE_URL}"
        VITE_NEW_ENGINE_TOKEN: "${VITE_NEW_ENGINE_TOKEN:?set VITE_NEW_ENGINE_TOKEN}"
    image: houston/web:local
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
