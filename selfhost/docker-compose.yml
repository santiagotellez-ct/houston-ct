services:
  host:
    build:
      context: ..
      dockerfile: selfhost/Dockerfile
    image: houston/self-host:local
    restart: unless-stopped
    environment:
      HOUSTON_HOST_TOKEN: "${HOUSTON_HOST_TOKEN:?set HOUSTON_HOST_TOKEN}"
      COMPOSIO_API_KEY: "${COMPOSIO_API_KEY:-}"
      HOUSTON_HOST_BIND: "0.0.0.0"
    volumes:
      - houston-data:/data
    expose:
      - "4318"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  houston-data:
