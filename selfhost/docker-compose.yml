services:
  host:
    build:
      context: ..
      dockerfile: selfhost/Dockerfile
    image: houston/self-host:local
    restart: unless-stopped
    environment:
      HOUSTON_HOST_TOKEN: "${HOUSTON_HOST_TOKEN:?set HOUSTON_HOST_TOKEN}"
      COMPOSIO_API_KEY: "${COMPOSIO_API_KEY:-}"
      HOUSTON_HOST_BIND: "0.0.0.0"
    volumes:
      - houston-data:/data
    expose:
      - "4318"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.houston.rule=Host(`houston.TUDOMINIO.com`)"
      - "traefik.http.routers.houston.entrypoints=websecure"
      - "traefik.http.routers.houston.tls.certresolver=letsencrypt"
      - "traefik.http.services.houston.loadbalancer.server.port=4318"
      - "traefik.http.middlewares.houston-sse.buffering.maxResponseBodyBytes=0"
      - "traefik.http.middlewares.houston-sse.buffering.maxRequestBodyBytes=0"
      - "traefik.http.routers.houston.middlewares=houston-sse"

networks:
  dokploy-network:
    external: true

volumes:
  houston-data:
